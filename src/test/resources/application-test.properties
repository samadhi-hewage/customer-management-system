# ============================================================
#  application-test.properties
#  Location: src/test/resources/application-test.properties
#
#  Used automatically by @DataJpaTest.
#  Overrides the main application.properties so tests use
#  H2 in-memory DB instead of MariaDB ? no MariaDB needed.
# ============================================================

# H2 in-memory database ? created fresh for each test run
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema from your entities automatically
# (since we are not running the DDL script manually in tests)
spring.jpa.hibernate.ddl-auto=create-drop

# H2 dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Show SQL in test output so you can see what queries run
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true